<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visite Virtuelle - Vierzon</title>
    
    <!-- Bibliothèque 360° Pannellum -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background-color: rgba(0, 0, 0, 0.9);
            padding: 15px;
            text-align: center;
            z-index: 10;
            border-bottom: 2px solid #333;
        }
        header h1 {
            font-size: 1.3rem;
            font-weight: normal;
        }
        #panorama {
            flex: 1;
            width: 100%;
            background-color: #000;
        }
        #nav-bar {
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 15px;
            overflow-x: auto;
        }
        .nav-btn {
            background: #2b2b2b;
            color: #ddd;
            border: 1px solid #555;
            padding: 10px 20px;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .nav-btn:hover {
            background: #444;
            color: #fff;
        }
        .nav-btn.active {
            background: #007bff;
            color: white;
            border-color: #00a2ff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Apt N2 _ place Vaillant Couturier Vierzon _ T3 _ 60 m2</h1>
    </header>

    <!-- Zone d'affichage 360° -->
    <div id="panorama"></div>

    <!-- Barre de boutons inférieure -->
    <div id="nav-bar">
        <button class="nav-btn active" onclick="chargerPhoto('sejour', this)">Séjour</button>
        <button class="nav-btn" onclick="chargerPhoto('cuisine', this)">Cuisine</button>
        <button class="nav-btn" onclick="chargerPhoto('sdb', this)">SDB</button>
        <button class="nav-btn" onclick="chargerPhoto('chambre1', this)">Chambre 1</button>
        <button class="nav-btn" onclick="chargerPhoto('chambre2', this)">Chambre 2</button>
    </div>

    <script>
        // Liste de vos images
        const scenes = {
            sejour: "sejour.JPG",
            cuisine: "cuisine.JPG",
            sdb: "sdb.JPG",
            chambre1: "chambre_gauche.JPG",
            chambre2: "chambre_fond.JPG"
        };

        let viewer;

        // Configuration de base partagée par toutes les photos
        const configDeBase = {
            "type": "equirectangular",
            "autoLoad": true,
            "cors": "anonymous",
            "showControls": false
        };

        // Chargement initial (Séjour)
        function initialiserVisite() {
            viewer = pannellum.viewer('panorama', {
                ...configDeBase,
                "panorama": scenes.sejour
            });
        }

        // Changement de pièce propre (destruction du viewer et recréation instantanée)
        function chargerPhoto(nomScene, boutonActif) {
            if (viewer) {
                viewer.destroy(); // On nettoie l'ancienne image pour éviter le bug beige
            }
            
            // On recrée le panorama avec la nouvelle image
            viewer = pannellum.viewer('panorama', {
                ...configDeBase,
                "panorama": scenes[nomScene]
            });
            
            // Gestion visuelle des boutons
            const boutons = document.querySelectorAll('.nav-btn');
            boutons.forEach(btn => btn.classList.remove('active'));
            boutonActif.classList.add('active');
        }

        window.onload = initialiserVisite;
    </script>

</body>
</html>
