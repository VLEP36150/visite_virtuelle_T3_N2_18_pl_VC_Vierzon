<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visite Virtuelle - Vierzon</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background-color: rgba(0, 0, 0, 0.9);
            padding: 15px;
            text-align: center;
            z-index: 10;
            border-bottom: 2px solid #333;
        }
        header h1 {
            font-size: 1.3rem;
            font-weight: normal;
        }
        #panorama {
            flex: 1;
            width: 100%;
            background-color: #000;
        }
        #nav-bar {
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 15px;
            overflow-x: auto;
        }
        .nav-btn {
            background: #2b2b2b;
            color: #ddd;
            border: 1px solid #555;
            padding: 10px 20px;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .nav-btn:hover {
            background: #444;
            color: #fff;
        }
        .nav-btn.active {
            background: #007bff;
            color: white;
            border-color: #00a2ff;
            font-weight: bold;
        }
        
        /* ÉCRAN DE CHARGEMENT AMÉLIORÉ */
        #loading-overlay {
            position: absolute;
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            /* Utilisation de sejour.JPG comme image de fond */
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('sejour.JPG') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }
        #loading-overlay h2 {
            font-size: 1.6rem;
            font-weight: normal;
            margin-bottom: 20px;
            max-width: 800px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #loading-status {
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #555;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <h2>Apt N2 _ place Vaillant Couturier Vierzon _ T3 _ 60 m2</h2>
        <div id="loading-status">Préparation de la visite... (0/5)</div>
    </div>

    <header>
        <h1>Apt N2 _ place Vaillant Couturier Vierzon _ T3 _ 60 m2</h1>
    </header>

    <div id="panorama"></div>

    <div id="nav-bar">
        <button class="nav-btn active" onclick="changerPiece('sejour', this)">Séjour</button>
        <button class="nav-btn" onclick="changerPiece('cuisine', this)">Cuisine</button>
        <button class="nav-btn" onclick="changerPiece('sdb', this)">SDB</button>
        <button class="nav-btn" onclick="changerPiece('chambre1', this)">Chambre 1</button>
        <button class="nav-btn" onclick="changerPiece('chambre2', this)">Chambre 2</button>
    </div>

    <script>
        // Configuration globale de Pannellum
        const configurationVisite = {
            "default": {
                "firstScene": "sejour",
                "autoLoad": true,
                "cors": "anonymous",
                "showControls": false
            },
            "scenes": {
                "sejour": { "type": "equirectangular", "panorama": "sejour.JPG" },
                "cuisine": { "type": "equirectangular", "panorama": "cuisine.JPG" },
                "sdb": { "type": "equirectangular", "panorama": "sdb.JPG" },
                "chambre1": { "type": "equirectangular", "panorama": "chambre_gauche.JPG" },
                "chambre2": { "type": "equirectangular", "panorama": "chambre_fond.JPG" }
            }
        };

        let viewer;
        let imagesChargees = 0;
        const totalImages = Object.keys(configurationVisite.scenes).length;

        // Préchargement en arrière-plan
        function prechargerImages() {
            const statusTxt = document.getElementById('loading-status');
            const overlay = document.getElementById('loading-overlay');
            
            for (let cle in configurationVisite.scenes) {
                const img = new Image();
                img.src = configurationVisite.scenes[cle].panorama;
                
                img.onload = () => {
                    imagesChargees++;
                    statusTxt.innerText = `Chargement des pièces... (${imagesChargees}/${totalImages})`;
                    
                    // Quand tout est en mémoire, on lance la visite interactive 360°
                    if (imagesChargees === totalImages) {
                        overlay.style.transition = 'opacity 0.5s ease';
                        overlay.style.opacity = '0';
                        setTimeout(() => {
                            overlay.style.display = 'none';
                            initialiserVisite();
                        }, 500);
                    }
                };
                
                img.onerror = () => {
                    console.error("Fichier introuvable : " + img.src);
                };
            }
        }

        function initialiserVisite() {
            viewer = pannellum.viewer('panorama', configurationVisite);
        }

        function changerPiece(nomScene, boutonActif) {
            if (viewer) {
                viewer.loadScene(nomScene);
                const boutons = document.querySelectorAll('.nav-btn');
                boutons.forEach(btn => btn.classList.remove('active'));
                boutonActif.classList.add('active');
            }
        }

        window.onload = prechargerImages;
    </script>

</body>
</html>
